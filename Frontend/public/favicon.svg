<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background gradient: deep dark to near-black -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111113"/>
      <stop offset="100%" stop-color="#08080a"/>
    </linearGradient>
    <!-- Gold gradient for the S lettermark -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C518"/>
      <stop offset="100%" stop-color="#c9a000"/>
    </linearGradient>
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" ry="12" fill="url(#bg)"/>

  <!-- Subtle golden border -->
  <rect width="63" height="63" x="0.5" y="0.5" rx="11.5" ry="11.5" fill="none" stroke="#F5C518" stroke-width="0.75" stroke-opacity="0.35"/>

  <!-- Bold "S" lettermark — designed as a custom fashion-brand S -->
  <text
    x="32"
    y="46"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="42"
    font-weight="700"
    fill="url(#gold)"
    filter="url(#glow)"
    letter-spacing="-2"
  >S</text>
</svg>
