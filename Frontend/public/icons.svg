<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Rich dark background gradient -->
    <linearGradient id="bg512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131315"/>
      <stop offset="100%" stop-color="#08080a"/>
    </linearGradient>
    <!-- Premium gold gradient -->
    <linearGradient id="gold512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8D020"/>
      <stop offset="50%" stop-color="#F5C518"/>
      <stop offset="100%" stop-color="#c9a000"/>
    </linearGradient>
    <!-- Subtle gold shimmer for accent details -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5C518" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#F5C518" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F5C518" stop-opacity="0.15"/>
    </linearGradient>
    <!-- Glow filter for the lettermark -->
    <filter id="glow512" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow filter for text -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#F5C518" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" rx="88" ry="88" fill="url(#bg512)"/>

  <!-- Subtle grid texture overlay (very faint) -->
  <line x1="0" y1="128" x2="512" y2="128" stroke="#F5C518" stroke-width="0.4" stroke-opacity="0.04"/>
  <line x1="0" y1="256" x2="512" y2="256" stroke="#F5C518" stroke-width="0.4" stroke-opacity="0.04"/>
  <line x1="0" y1="384" x2="512" y2="384" stroke="#F5C518" stroke-width="0.4" stroke-opacity="0.04"/>
  <line x1="128" y1="0" x2="128" y2="512" stroke="#F5C518" stroke-width="0.4" stroke-opacity="0.04"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="#F5C518" stroke-width="0.4" stroke-opacity="0.04"/>
  <line x1="384" y1="0" x2="384" y2="512" stroke="#F5C518" stroke-width="0.4" stroke-opacity="0.04"/>

  <!-- Radial ambient glow at center -->
  <radialGradient id="ambientGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#F5C518" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#F5C518" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="88" ry="88" fill="url(#ambientGlow)"/>

  <!-- ── Golden border ring ── -->
  <rect x="3" y="3" width="506" height="506" rx="86" ry="86" fill="none" stroke="url(#gold512)" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- ── Accent top bar ── -->
  <rect x="88" y="52" width="336" height="2" rx="1" fill="url(#shimmer)"/>

  <!-- ── Main "S" lettermark ── -->
  <text
    x="256"
    y="355"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="340"
    font-weight="700"
    fill="url(#gold512)"
    filter="url(#glow512)"
    letter-spacing="-16"
  >S</text>

  <!-- ── SNITCH wordmark below ── -->
  <text
    x="256"
    y="440"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="42"
    font-weight="900"
    fill="#F5C518"
    filter="url(#shadow)"
    letter-spacing="22"
    fill-opacity="0.9"
  >SNITCH</text>

  <!-- ── Accent bottom bar ── -->
  <rect x="88" y="462" width="336" height="2" rx="1" fill="url(#shimmer)"/>

  <!-- Small corner accent dots -->
  <circle cx="68" cy="68" r="3" fill="#F5C518" fill-opacity="0.3"/>
  <circle cx="444" cy="68" r="3" fill="#F5C518" fill-opacity="0.3"/>
  <circle cx="68" cy="444" r="3" fill="#F5C518" fill-opacity="0.3"/>
  <circle cx="444" cy="444" r="3" fill="#F5C518" fill-opacity="0.3"/>
</svg>
