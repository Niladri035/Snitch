<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" max-width="800" style="background: linear-gradient(135deg, #0d2b29 0%, #1e5c58 100%); border-radius: 24px; box-shadow: 0 20px 40px rgba(13,43,41,0.3);">
  <!-- Background Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(42, 138, 133, 0.15)" stroke-width="1"/>
    </pattern>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C518" />
      <stop offset="100%" stop-color="#b8860b" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6aaca8" />
      <stop offset="100%" stop-color="#1e5c58" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" rx="24"/>
  
  <!-- Decorative Orbs -->
  <circle cx="700" cy="60" r="50" fill="rgba(245, 197, 24, 0.08)" filter="url(#glow)"/>
  <circle cx="100" cy="180" r="70" fill="rgba(42, 138, 133, 0.12)" filter="url(#glow)"/>

  <!-- Tech Lines -->
  <path d="M 50 120 L 750 120" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <path d="M 280 80 L 520 80" stroke="url(#cyan-grad)" stroke-width="2" stroke-dasharray="8 4"/>
  
  <!-- Title Text -->
  <text x="50%" y="125" text-anchor="middle" font-family="'Saira', 'Segoe UI', sans-serif" font-weight="900" font-size="64" fill="url(#gold-grad)" letter-spacing="12" filter="url(#glow)">SNITCH</text>
  
  <!-- Subtitle -->
  <text x="50%" y="170" text-anchor="middle" font-family="'Exo', 'Segoe UI', sans-serif" font-weight="600" font-size="13" fill="#6aaca8" letter-spacing="4">THE NEXT-GEN MULTI-VENDOR SURVEILLANCE FASHION</text>
  
  <!-- Small Badge -->
  <rect x="360" y="190" width="80" height="20" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="400" y="203" text-anchor="middle" font-family="'Exo', sans-serif" font-weight="bold" font-size="9" fill="#F5C518" letter-spacing="1">LIVE v2.5</text>
</svg>
